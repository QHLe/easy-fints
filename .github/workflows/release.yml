name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Compile Python sources
        run: |
          python -m compileall \
            src \
            api_tan_test_helper.py \
            test_accounts_api_tan.py \
            test_balance_api_tan.py \
            test_transactions_api_tan.py \
            test_single_account_api_tan.py \
            test_transfer_api_tan.py

      - name: Run simulated backend tests
        run: pytest tests -q

  docker-build:
    name: Build Release Container
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: python-fints-rest-wrapper:${{ github.ref_name }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - validate
      - docker-build

    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            Highlights:
            - account, balance, transaction, and transfer API endpoints
            - TAN, decoupled confirmation, and VoP continuation flow
            - session inspection and cancellation endpoints
            - simulated backend test suite and hardened logging

            Note:
            - active confirmation sessions are in-memory and process-local
